<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brand Character Exploration</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: black;
            color: white;
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        /* Card Flip Animation Logic */
        .card-container {
            perspective: 1200px;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
            cursor: pointer;
        }

        .card-container.is-flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 1.5rem; /* 24px */
        }

        .card-back {
            transform: rotateY(180deg);
            background-color: white;
            color: black;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2.5rem;
            text-align: center;
        }

        /* Hover effects */
        .group:hover .card-glow {
            box-shadow: 0 0 60px rgba(255, 255, 255, 0.4);
        }
    </style>
</head>
<body class="selection:bg-white selection:text-black">

    <div class="min-h-screen py-16 px-8 flex flex-col items-center">
        <div class="max-w-4xl text-center mb-16">
            <h1 class="text-5xl md:text-6xl font-extrabold mb-6 tracking-tight">
                Test Your Brand Character
            </h1>
            <p class="text-lg md:text-xl text-gray-400 font-light tracking-wide">
                Click an image to view the full scenario prompt
            </p>
        </div>

        <div id="cards-grid" class="flex flex-wrap justify-center gap-12 w-full max-w-7xl">
            </div>
    </div>

    <script>
        const scenariosData = [
            { 
                id: 1, 
                image: "https://raw.githubusercontent.com/karolina-afk/branding-workshop-assets-v3/main/Gemini_Generated_Image_30pfqg30pfqg30pf.png",
                setup: "A workshop you facilitated didn't land well; the participants felt the research was too dense and they didn't feel \"connected.\"",
                task: "Write a 3-sentence statement that shows how your brand responds to criticism."
            },
            { 
                id: 2, 
                image: "https://raw.githubusercontent.com/karolina-afk/branding-workshop-assets-v3/main/Gemini_Generated_Image_9mz81t9mz81t9mz8.png",
                setup: "Your research findings are being misused and wrongly interpreted by another organisation. Your brand's reputation is at risk.",
                task: "Write a 3-sentence statement that defends your brand's integrity and corrects the narrative."
            },
            { 
                id: 3, 
                image: "https://raw.githubusercontent.com/karolina-afk/branding-workshop-assets-v3/main/Gemini_Generated_Image_f0168cf0168cf016.png",
                setup: "You're seated next to your potential dream client at an executive dinner party.",
                task: "Craft a 3-sentence introduction that reflects your brand's unique positioning and what sets you apart."
            },
            { 
                id: 4, 
                image: "https://raw.githubusercontent.com/karolina-afk/branding-workshop-assets-v3/main/Gemini_Generated_Image_po3h87po3h87po3h.png",
                setup: "Your company has received a major industry award.",
                task: "Write a 3-sentence acceptance speech that reveals what your brand truly values."
            },
            { 
                id: 5, 
                image: "https://raw.githubusercontent.com/karolina-afk/branding-workshop-assets-v3/main/Gemini_Generated_Image_s3e0u3s3e0u3s3e0.png",
                setup: "You are seated next to a high-powered executive who believes \"values in leadership\" is just a buzzword. They ask what you do.",
                task: "Write a 3-sentence rebuttal that articulates why your brand believes this matter."
            }
        ];

        const grid = document.getElementById('cards-grid');

        scenariosData.forEach(data => {
            const cardWrapper = document.createElement('div');
            cardWrapper.className = "flex flex-col items-center";
            
            cardWrapper.innerHTML = `
                <h2 class="text-xl font-semibold mb-6 text-white tracking-wide">Scenario ${data.id}</h2>
                <div class="card-container group w-80 h-96" onclick="this.classList.toggle('is-flipped')">
                    <div class="card-inner">
                        <div class="card-front border border-gray-800 bg-gray-900 overflow-hidden relative">
                            <div class="card-glow absolute inset-0 rounded-3xl transition-shadow duration-300 pointer-events-none z-10"></div>
                            <img src="${data.image}" alt="Scenario ${data.id}" 
                                 class="w-full h-full object-cover object-top transition-all duration-500 scale-[1.15] group-hover:scale-[1.25] opacity-90 group-hover:opacity-100">
                        </div>
                        <div class="card-back shadow-[0_0_40px_rgba(255,255,255,0.2)]">
                            <div class="mb-4">
                                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M3 5h4"/><path d="M21 17v4"/><path d="M19 19h4"/></svg>
                            </div>
                            <div class="flex flex-col gap-4 overflow-y-auto">
                                <p class="text-gray-800 text-lg leading-relaxed">${data.setup}</p>
                                <p class="text-black text-lg font-bold">${data.task}</p>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            grid.appendChild(cardWrapper);
        });
    </script>
</body>
</html>
